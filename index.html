    <style>
:root {
  color-scheme: light;
  --paper: #f4f1e9;
  --paper-deep: #ebe6da;
  --surface: #fffdf8;
  --ink: #17322f;
  --ink-soft: #526663;
  --accent: #b35132;
  --accent-soft: #f1d8cb;
  --line: #d9d4c8;
  --shadow: 0 24px 60px rgba(25, 45, 42, 0.12);
  --radius: 22px;
  --shell: min(1120px, calc(100% - 48px));
  --serif: Georgia, "Times New Roman", "Noto Serif SC", serif;
  --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
}

html[data-theme="dark"] {
  color-scheme: dark;
  --paper: #101b1a;
  --paper-deep: #172422;
  --surface: #1d2d2a;
  --ink: #edf1ea;
  --ink-soft: #afbfba;
  --accent: #e1845f;
  --accent-soft: #4c2e24;
  --line: #344743;
  --shadow: 0 24px 60px rgba(0, 0, 0, 0.24);
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
  scroll-padding-top: 92px;
}

body {
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.7;
  text-rendering: optimizeLegibility;
}

a {
  color: inherit;
  text-decoration: none;
}

button,
a {
  -webkit-tap-highlight-color: transparent;
}

button {
  font: inherit;
}

img {
  display: block;
  max-width: 100%;
}

.shell {
  width: var(--shell);
  margin-inline: auto;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.skip-link {
  position: fixed;
  z-index: 1000;
  top: 10px;
  left: 10px;
  padding: 10px 14px;
  transform: translateY(-150%);
  border-radius: 10px;
  background: var(--ink);
  color: var(--paper);
}

.skip-link:focus {
  transform: translateY(0);
}

.site-header {
  position: sticky;
  z-index: 100;
  top: 0;
  border-bottom: 1px solid transparent;
  background: color-mix(in srgb, var(--paper) 88%, transparent);
  backdrop-filter: blur(16px);
  transition: border-color 180ms ease;
}

.site-header.is-scrolled {
  border-color: var(--line);
}

.header-inner {
  display: flex;
  min-height: 76px;
  align-items: center;
  gap: 28px;
}

.wordmark {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-right: auto;
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.wordmark-mark {
  color: var(--accent);
  font-size: 24px;
}

.site-nav {
  display: flex;
  align-items: center;
  gap: 26px;
}

.site-nav a {
  color: var(--ink-soft);
  font-size: 14px;
  font-weight: 650;
  transition: color 150ms ease;
}

.site-nav a:hover,
.site-nav a:focus-visible {
  color: var(--accent);
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.text-button,
.icon-button,
.menu-button {
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--ink);
  cursor: pointer;
}

.text-button,
.icon-button {
  display: grid;
  height: 38px;
  min-width: 38px;
  place-items: center;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 750;
}

.icon-button {
  font-size: 17px;
}

.menu-button {
  display: none;
}

.hero {
  display: grid;
  min-height: 680px;
  padding-block: 86px 100px;
  align-items: center;
  grid-template-columns: minmax(0, 1.35fr) minmax(280px, 0.65fr);
  gap: clamp(60px, 10vw, 130px);
}

.eyebrow,
.section-kicker {
  margin: 0 0 14px;
  color: var(--accent);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.hero h1 {
  max-width: 720px;
  margin: 0;
  font-family: var(--serif);
  font-size: clamp(54px, 8vw, 94px);
  font-weight: 500;
  letter-spacing: -0.065em;
  line-height: 0.98;
}

.hero-role {
  margin: 28px 0 0;
  color: var(--ink);
  font-size: clamp(18px, 2vw, 22px);
  font-weight: 700;
}

.hero-summary {
  max-width: 670px;
  margin: 18px 0 0;
  color: var(--ink-soft);
  font-size: 17px;
}

.hero-actions,
.contact-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 32px;
}

.button {
  display: inline-flex;
  min-height: 46px;
  align-items: center;
  justify-content: center;
  gap: 9px;
  padding: 10px 18px;
  border: 1px solid var(--ink);
  border-radius: 999px;
  font-size: 14px;
  font-weight: 750;
  transition: transform 150ms ease, background-color 150ms ease, color 150ms ease;
}

.button:hover {
  transform: translateY(-2px);
}

.button-primary {
  background: var(--ink);
  color: var(--paper);
}

.button-secondary {
  background: transparent;
  color: var(--ink);
}

.button-placeholder,
.button-placeholder:hover {
  cursor: default;
  opacity: 0.62;
  transform: none;
}

.quick-facts {
  display: flex;
  flex-wrap: wrap;
  gap: 10px 24px;
  margin: 34px 0 0;
  padding-top: 24px;
  border-top: 1px solid var(--line);
}

.quick-facts div {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--ink-soft);
  font-size: 14px;
}

.quick-facts dt {
  color: var(--accent);
}

.quick-facts dd {
  margin: 0;
}

.portrait-wrap {
  position: relative;
  width: min(100%, 360px);
  justify-self: center;
}

.portrait-backdrop {
  position: absolute;
  inset: -18px 18px 18px -18px;
  border: 1px solid var(--accent);
  border-radius: 45% 45% 18px 18px;
  transform: rotate(-3deg);
}

.portrait {
  position: relative;
  width: 100%;
  aspect-ratio: 4 / 5;
  border-radius: 45% 45% 18px 18px;
  object-fit: cover;
  box-shadow: var(--shadow);
}

.availability {
  position: absolute;
  right: -22px;
  bottom: 28px;
  display: flex;
  max-width: 220px;
  align-items: center;
  gap: 9px;
  padding: 12px 15px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: var(--surface);
  box-shadow: 0 12px 30px rgba(22, 43, 40, 0.14);
  font-size: 12px;
  font-weight: 700;
  line-height: 1.4;
}

.availability::before {
  width: 8px;
  height: 8px;
  flex: 0 0 auto;
  border-radius: 50%;
  background: #4f9a6b;
  box-shadow: 0 0 0 4px rgba(79, 154, 107, 0.15);
  content: "";
}

.stats-band {
  border-block: 1px solid var(--line);
  background: var(--surface);
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
}

.stat {
  padding: 32px 28px;
  border-right: 1px solid var(--line);
}

.stat:first-child {
  padding-left: 0;
}

.stat:last-child {
  border-right: 0;
}

.stat-value {
  display: block;
  margin-bottom: 4px;
  font-family: var(--serif);
  font-size: 34px;
  line-height: 1.1;
}

.stat-label {
  color: var(--ink-soft);
  font-size: 13px;
}

.section {
  padding-block: 118px;
}

.section-heading {
  max-width: 760px;
  margin-bottom: 52px;
}

.section-heading h2,
.contact-inner h2 {
  margin: 0;
  font-family: var(--serif);
  font-size: clamp(38px, 5vw, 62px);
  font-weight: 500;
  letter-spacing: -0.045em;
  line-height: 1.08;
}

.section-heading > p:last-child,
.heading-row > p,
.contact-inner p {
  margin: 18px 0 0;
  color: var(--ink-soft);
}

.heading-row {
  display: grid;
  max-width: none;
  align-items: end;
  grid-template-columns: 1fr minmax(260px, 0.55fr);
  gap: 60px;
}

.heading-row > p {
  margin-bottom: 4px;
}

.research-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.research-card {
  min-height: 300px;
  padding: 30px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
  transition: transform 180ms ease, box-shadow 180ms ease;
}

.research-card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow);
}

.card-number {
  color: var(--accent);
  font-family: var(--serif);
  font-size: 16px;
}

.research-card h3,
.project-card h3 {
  margin: 58px 0 12px;
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 500;
  letter-spacing: -0.025em;
  line-height: 1.2;
}

.research-card p,
.project-card p {
  margin: 0;
  color: var(--ink-soft);
  font-size: 14px;
}

.section-projects,
.section-experience {
  background: var(--paper-deep);
}

.project-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 22px;
}

.project-card {
  position: relative;
  display: flex;
  min-height: 590px;
  padding: 34px;
  flex-direction: column;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
}

.project-card::after {
  position: absolute;
  top: -90px;
  right: -70px;
  width: 230px;
  height: 230px;
  border: 1px solid var(--accent-soft);
  border-radius: 50%;
  box-shadow: 0 0 0 34px var(--accent-soft);
  content: "";
  opacity: 0.48;
}

.project-card h3 {
  max-width: 78%;
  margin-top: 72px;
}

.project-highlights {
  display: grid;
  margin: 22px 0 0;
  padding-left: 18px;
  gap: 10px;
  color: var(--ink-soft);
  font-size: 13px;
  line-height: 1.55;
}

.project-highlights li::marker {
  color: var(--accent);
}

.project-meta,
.tag-list,
.publication-links {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.project-meta {
  position: relative;
  z-index: 1;
  color: var(--accent);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.tag-list {
  margin-top: auto;
  padding-top: 28px;
}

.tag {
  padding: 5px 10px;
  border: 1px solid var(--line);
  border-radius: 999px;
  color: var(--ink-soft);
  font-size: 11px;
  font-weight: 700;
}

.inline-link,
.publication-link {
  color: var(--accent);
  font-size: 13px;
  font-weight: 750;
}

.inline-link::after,
.publication-link::after {
  content: " ↗";
}

.is-hidden {
  display: none !important;
}

.publication-list {
  margin: 0;
  padding: 0;
  list-style: none;
  counter-reset: publications;
}

.publication-item {
  display: grid;
  padding: 30px 0;
  border-top: 1px solid var(--line);
  counter-increment: publications;
  grid-template-columns: 52px 1fr auto;
  gap: 20px;
}

.publication-item:last-child {
  border-bottom: 1px solid var(--line);
}

.publication-item::before {
  color: var(--accent);
  content: "0" counter(publications);
  font-family: var(--serif);
  font-size: 15px;
}

.publication-item h3 {
  margin: 0 0 8px;
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 500;
  line-height: 1.3;
}

.publication-authors,
.publication-venue {
  margin: 0;
  color: var(--ink-soft);
  font-size: 13px;
}

.publication-venue {
  margin-top: 4px;
  font-style: italic;
}

.publication-links {
  align-content: start;
  justify-content: flex-end;
}

.experience-grid {
  display: grid;
  grid-template-columns: 1.15fr 0.85fr;
  gap: 90px;
}

.subsection-title {
  margin: 0 0 28px;
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 500;
}

.timeline-item {
  position: relative;
  padding: 0 0 38px 28px;
  border-left: 1px solid var(--line);
}

.timeline-item::before {
  position: absolute;
  top: 8px;
  left: -5px;
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--accent);
  content: "";
}

.timeline-item:last-child {
  padding-bottom: 0;
}

.timeline-item h4,
.award-item h4 {
  margin: 0;
  font-size: 16px;
}

.timeline-item p,
.award-item p {
  margin: 4px 0 0;
  color: var(--ink-soft);
  font-size: 13px;
}

.timeline-date {
  color: var(--accent) !important;
  font-weight: 750;
}

.award-list {
  border-top: 1px solid var(--line);
}

.award-item {
  display: grid;
  padding: 20px 0;
  border-bottom: 1px solid var(--line);
  grid-template-columns: 1fr auto;
  gap: 20px;
}

.award-year {
  color: var(--accent) !important;
  font-family: var(--serif);
}

.skill-groups {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

.skill-group {
  padding-top: 22px;
  border-top: 2px solid var(--ink);
}

.skill-group h3 {
  margin: 0 0 18px;
  font-family: var(--serif);
  font-size: 21px;
  font-weight: 500;
}

.skill-group ul {
  margin: 0;
  padding: 0;
  color: var(--ink-soft);
  list-style: none;
}

.skill-group li + li {
  margin-top: 7px;
}

.contact-section {
  padding-block: 100px;
  background: var(--ink);
  color: var(--paper);
}

.contact-inner {
  display: grid;
  align-items: center;
  grid-template-columns: 1.25fr 0.75fr;
  gap: 70px;
}

.contact-inner p {
  color: color-mix(in srgb, var(--paper) 75%, transparent);
}

.contact-inner .section-kicker {
  color: var(--accent);
}

.contact-actions {
  justify-content: flex-end;
  margin-top: 0;
}

.contact-actions .button {
  border-color: var(--paper);
}

.contact-actions .button-primary {
  background: var(--paper);
  color: var(--ink);
}

.contact-actions .button-secondary {
  color: var(--paper);
}

.site-footer {
  background: var(--ink);
  color: color-mix(in srgb, var(--paper) 65%, transparent);
}

.footer-inner {
  display: flex;
  min-height: 88px;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid color-mix(in srgb, var(--paper) 18%, transparent);
  font-size: 12px;
}

.footer-inner a {
  color: var(--paper);
  font-weight: 700;
}

.reveal {
  opacity: 0;
  transform: translateY(18px);
  transition: opacity 650ms ease, transform 650ms ease;
}

.reveal.is-visible {
  opacity: 1;
  transform: translateY(0);
}

@media (prefers-reduced-motion: reduce) {
  html {
    scroll-behavior: auto;
  }

  *,
  *::before,
  *::after {
    scroll-behavior: auto !important;
    transition-duration: 0.01ms !important;
  }
}

@media (max-width: 900px) {
  :root {
    --shell: min(100% - 36px, 720px);
  }

  .header-inner {
    gap: 10px;
  }

  .menu-button {
    display: grid;
    width: 40px;
    height: 40px;
    padding: 10px;
    place-content: center;
    gap: 4px;
    border-radius: 50%;
  }

  .menu-button span:not(.sr-only) {
    width: 17px;
    height: 1.5px;
    background: currentColor;
  }

  .site-nav {
    position: absolute;
    top: 66px;
    right: 18px;
    left: 18px;
    display: none;
    padding: 18px;
    flex-direction: column;
    align-items: stretch;
    gap: 0;
    border: 1px solid var(--line);
    border-radius: 18px;
    background: var(--surface);
    box-shadow: var(--shadow);
  }

  .site-nav.is-open {
    display: flex;
  }

  .site-nav a {
    padding: 10px;
    font-size: 15px;
  }

  .header-actions {
    order: 2;
  }

  .menu-button {
    order: 3;
  }

  .hero {
    min-height: auto;
    padding-block: 72px 86px;
    grid-template-columns: 1fr;
    gap: 82px;
  }

  .portrait-wrap {
    width: min(82%, 360px);
  }

  .stats-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .stat:nth-child(2) {
    border-right: 0;
  }

  .stat:nth-child(-n + 2) {
    border-bottom: 1px solid var(--line);
  }

  .stat:nth-child(3) {
    padding-left: 0;
  }

  .research-grid,
  .skill-groups {
    grid-template-columns: 1fr;
  }

  .research-card {
    min-height: 250px;
  }

  .project-grid,
  .experience-grid,
  .contact-inner {
    grid-template-columns: 1fr;
  }

  .heading-row {
    align-items: start;
    grid-template-columns: 1fr;
    gap: 12px;
  }

  .contact-actions {
    justify-content: flex-start;
  }
}

@media (max-width: 560px) {
  :root {
    --shell: calc(100% - 28px);
  }

  .wordmark-mark {
    display: none;
  }

  .wordmark {
    font-size: 17px;
  }

  .hero h1 {
    font-size: clamp(48px, 17vw, 72px);
  }

  .hero-actions .button,
  .contact-actions .button {
    width: 100%;
  }

  .availability {
    right: -8px;
  }

  .section {
    padding-block: 88px;
  }

  .stats-grid {
    grid-template-columns: 1fr;
  }

  .stat,
  .stat:first-child,
  .stat:nth-child(3) {
    padding: 22px 0;
    border-right: 0;
    border-bottom: 1px solid var(--line);
  }

  .stat:last-child {
    border-bottom: 0;
  }

  .project-grid {
    grid-template-columns: 1fr;
  }

  .project-card {
    min-height: 0;
    padding: 26px;
  }

  .project-card h3 {
    max-width: 90%;
  }

  .publication-item {
    grid-template-columns: 34px 1fr;
  }

  .publication-links {
    padding-left: 54px;
    grid-column: 1 / -1;
    justify-content: flex-start;
  }

  .experience-grid {
    gap: 66px;
  }

  .footer-inner {
    padding-block: 22px;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    gap: 4px;
  }
}

</style>

      items: [

        {

          degree: "Undergraduate Engineering Studies",
          institution: "Glasgow College, University of Electronic Science and Technology of China",
          detail: "Current project focus: IC design, power electronics, embedded hardware, and engineering system integration",
        },
      ],
      awards: [
        { title: "Comprehensive Modern Electronics Laboratory", organization: "Analog IC design and layout verification", year: "2026" },
        { title: "Integrated Circuit Design", organization: "Mixed-signal systems and digital backends", year: "2026" },
        { title: "Power Electronics", organization: "Converters, PWM, and laboratory measurement", year: "2026" },
        { title: "Engineering Project Management & Finance", organization: "Autonomous vehicle system project", year: "2026" },
      ],

      groups: [

          items: ["LTspice and PWM / converter / inverter analysis", "Oscilloscope, digital multimeter, and waveform analysis", "PCB, soldering, assembly, and system debugging"],

  },

</script>
    <script>
(function () {
  "use strict";

  const data = window.SITE_DATA;
  if (!data) return;

  const $ = (selector) => document.querySelector(selector);
  const $$ = (selector) => Array.from(document.querySelectorAll(selector));
  const text = (selector, value) => {
    const node = $(selector);
    if (node) node.textContent = value ?? "";
  };
  const escapeHtml = (value) =>
    String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");

  const getStored = (key, fallback) => {
    try {
      return localStorage.getItem(key) || fallback;
    } catch {
      return fallback;
    }
  };

  const setStored = (key, value) => {
    try {
      localStorage.setItem(key, value);
    } catch {
      // The page still works when storage is unavailable.
    }
  };

  let language = data.settings.defaultLanguage || "en";
  if (!data[language]) language = "en";

  function button(label, href, kind = "secondary", external = false) {
    if (!href) return "";
    const attributes = external ? ' target="_blank" rel="noreferrer"' : "";
    return `<a class="button button-${kind}" href="${escapeHtml(href)}"${attributes}>${escapeHtml(label)} <span aria-hidden="true">${external ? "↗" : "→"}</span></a>`;
  }

  function render() {
    const content = data[language];
    const settings = data.settings;
    const isZh = language === "zh";

    document.documentElement.lang = isZh ? "zh-CN" : "en";
    document.title = content.meta.title;
    $("meta[name='description']")?.setAttribute("content", content.meta.description);

    text("#skip-link", content.ui.skip);
    text("#wordmark", content.profile.name);
    text("#language-toggle", content.ui.language);
    $("#language-toggle")?.setAttribute("aria-label", content.ui.languageLabel);
    $("#theme-toggle")?.setAttribute("aria-label", content.ui.theme);
    $("#menu-button .sr-only")?.replaceChildren(document.createTextNode(content.ui.menu));
    text("#back-to-top", content.ui.backToTop);

    Object.entries(content.nav).forEach(([key, value]) => {
      text(`[data-nav="${key}"]`, value);
    });

    text("#hero-eyebrow", content.profile.eyebrow);
    text("#hero-name", content.profile.name);
    text("#hero-role", `${content.profile.role} · ${content.profile.organization}`);
    text("#hero-summary", content.profile.summary);
    text("#availability", content.profile.status);
    $("#portrait").src = settings.photo || "assets/profile-placeholder.svg";
    $("#portrait").alt = content.profile.photoAlt;

    $("#hero-actions").innerHTML =
      button(content.ui.researchCta, "#projects", "primary") +
      button(content.ui.cv, settings.cvUrl, "secondary", true);

    const facts = [
      ["⌖", content.profile.location],
      ["✉", settings.email || content.profile.emailPlaceholder],
    ].filter(([, value]) => value);
    $("#quick-facts").innerHTML = facts
      .map(([icon, value]) => `<div><dt aria-hidden="true">${icon}</dt><dd>${escapeHtml(value)}</dd></div>`)
      .join("");

    $("#stats-grid").innerHTML = content.stats
      .map((item) => `<div class="stat"><strong class="stat-value">${escapeHtml(item.value)}</strong><span class="stat-label">${escapeHtml(item.label)}</span></div>`)
      .join("");

    text("#research-kicker", content.research.kicker);
    text("#research-title", content.research.title);
    text("#research-intro", content.research.intro);
    $("#research-grid").innerHTML = content.research.items
      .map((item, index) => `<article class="research-card reveal"><span class="card-number">0${index + 1}</span><h3>${escapeHtml(item.title)}</h3><p>${escapeHtml(item.description)}</p></article>`)
      .join("");

    text("#projects-kicker", content.projects.kicker);
    text("#projects-title", content.projects.title);
    text("#projects-intro", content.projects.intro);
    $("#project-grid").innerHTML = content.projects.items
      .map((item) => {
        const highlights = (item.highlights || [])
          .map((highlight) => `<li>${escapeHtml(highlight)}</li>`)
          .join("");
        return `<article class="project-card reveal"><div class="project-meta"><span>${escapeHtml(item.period)}</span><span>·</span><span>${escapeHtml(item.role)}</span></div><h3>${escapeHtml(item.title)}</h3><p>${escapeHtml(item.description)}</p>${highlights ? `<ul class="project-highlights">${highlights}</ul>` : ""}<div class="tag-list">${item.tags.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div></article>`;
      })
      .join("");

    text("#publications-kicker", content.publications.kicker);
    text("#publications-title", content.publications.title);
    const scholar = $("#scholar-link");
    if (settings.scholarUrl) {
      scholar.href = settings.scholarUrl;
      scholar.textContent = content.ui.scholar;
      scholar.classList.remove("is-hidden");
    } else {
      scholar.classList.add("is-hidden");
    }
    $("#publication-list").innerHTML = content.publications.items
      .map((item) => {
        const links = (item.links || [])
          .filter((link) => link.url)
          .map((link) => `<a class="publication-link" href="${escapeHtml(link.url)}" target="_blank" rel="noreferrer">${escapeHtml(link.label)}</a>`)
          .join("");
        return `<li class="publication-item reveal"><div><h3>${escapeHtml(item.title)}</h3><p class="publication-authors">${escapeHtml(item.authors)}</p><p class="publication-venue">${escapeHtml(item.venue)}</p></div><div class="publication-links">${links}</div></li>`;
      })
      .join("");

    text("#experience-kicker", content.experience.kicker);
    text("#experience-title", content.experience.title);
    text("#education-title", content.experience.educationTitle);
    text("#awards-title", content.experience.awardsTitle);
    $("#education-list").innerHTML = content.experience.education
      .map((item) => `<article class="timeline-item reveal"><p class="timeline-date">${escapeHtml(item.date)}</p><h4>${escapeHtml(item.degree)}</h4><p>${escapeHtml(item.institution)}</p><p>${escapeHtml(item.detail)}</p></article>`)
      .join("");
    $("#award-list").innerHTML = content.experience.awards
      .map((item) => `<article class="award-item reveal"><div><h4>${escapeHtml(item.title)}</h4><p>${escapeHtml(item.organization)}</p></div><p class="award-year">${escapeHtml(item.year)}</p></article>`)
      .join("");

    text("#skills-kicker", content.skills.kicker);
    text("#skills-title", content.skills.title);
    $("#skill-groups").innerHTML = content.skills.groups
      .map((group) => `<article class="skill-group reveal"><h3>${escapeHtml(group.title)}</h3><ul>${group.items.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul></article>`)
      .join("");

    text("#contact-kicker", content.contact.kicker);
    text("#contact-title", content.contact.title);
    text("#contact-copy", content.contact.copy);
    const emailUrl = settings.email ? `mailto:${settings.email}` : "";
    const emailAction = emailUrl
      ? button(content.ui.email, emailUrl, "primary")
      : `<span class="button button-secondary button-placeholder" aria-disabled="true">${escapeHtml(content.ui.emailPlaceholder)}</span>`;
    $("#contact-actions").innerHTML =
      emailAction +
      button(content.ui.github, settings.githubUrl, "secondary", true) +
      button(content.ui.orcid, settings.orcidUrl, "secondary", true);

    text("#footer-copy", content.footer.replace("{year}", new Date().getFullYear()));
    observeReveals();
  }

  let revealObserver;
  function observeReveals() {
    revealObserver?.disconnect();
    if (!("IntersectionObserver" in window)) {
      $$(".reveal").forEach((node) => node.classList.add("is-visible"));
      return;
    }
    revealObserver = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("is-visible");
            revealObserver.unobserve(entry.target);
          }
        });
      },
      { threshold: 0.12 }
    );
    $$(".reveal").forEach((node) => revealObserver.observe(node));
  }

  const languageButton = $("#language-toggle");
  languageButton?.addEventListener("click", () => {
    language = language === "en" ? "zh" : "en";
    render();
  });

  const preferredDark = window.matchMedia?.("(prefers-color-scheme: dark)").matches;
  const storedTheme = getStored("academic-site-theme", preferredDark ? "dark" : "light");
  document.documentElement.dataset.theme = storedTheme;
  text(".theme-icon", storedTheme === "dark" ? "☀" : "☾");

  $("#theme-toggle").addEventListener("click", () => {
    const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
    document.documentElement.dataset.theme = next;
    text(".theme-icon", next === "dark" ? "☀" : "☾");
    setStored("academic-site-theme", next);
  });

  const menuButton = $("#menu-button");
  const nav = $("#site-nav");
  menuButton.addEventListener("click", () => {
    const open = nav.classList.toggle("is-open");
    menuButton.setAttribute("aria-expanded", String(open));
  });
  $$("#site-nav a").forEach((link) =>
    link.addEventListener("click", () => {
      nav.classList.remove("is-open");
      menuButton.setAttribute("aria-expanded", "false");
    })
  );

  window.addEventListener("scroll", () => {
    $(".site-header").classList.toggle("is-scrolled", window.scrollY > 8);
  }, { passive: true });

  render();
})();

</script>
  </body>
</html>
